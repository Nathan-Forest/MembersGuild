services:

  membersguild-db:
    image: postgres:16-alpine
    container_name: membersguild-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: membersguild
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - membersguild-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  membersguild-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: membersguild-backend
    restart: unless-stopped
    ports:
      - "5015:5015"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: >-
        Host=membersguild-db;
        Port=5432;
        Database=membersguild;
        Username=${DB_USER};
        Password=${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AllowedOrigins__0: ${FRONTEND_URL}
    depends_on:
      - membersguild-db

  membersguild-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://membersguild-backend:5015
    container_name: membersguild-frontend
    restart: unless-stopped
    ports:
      - "5016:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://membersguild-backend:5015
    depends_on:
      - membersguild-backend

volumes:
  membersguild-db-data:
    name: membersguild-db-data